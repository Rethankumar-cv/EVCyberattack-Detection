services:
  - type: web
    name: ev-cyber-backend
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: FRONTEND_URL
        value: https://ev-cyberattack-detection.vercel.app  # update after Vercel deploy
      - key: MODEL_DIR
        value: /mnt/models  # update if using Render Disk
    disk:
      name: model-storage
      mountPath: /mnt/models
      sizeGB: 5  # knn_model.pkl is ~300MB — 5GB gives headroom
